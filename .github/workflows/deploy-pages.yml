name: Build and deploy to GitHub Pages

# Permissions required by the deploy-pages action
permissions:
  id-token: write  # needed to authenticate with GitHub Pages via OIDC
  pages: write     # needed to publish to GitHub Pages
  contents: read   # needed to check out the repository

# Trigger: run this workflow on every push to main
on:
  push:
    branches: [ main ]

# Concurrency guard: if two pushes happen close together, the second run
# waits for the first to finish rather than racing it. This prevents the
# site from being deployed in an inconsistent or partially-overwritten state.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    steps:
      # 1. Download the repository onto the build server
      - uses: actions/checkout@v4

      # 2. Install pnpm (the package manager this project uses)
      - uses: pnpm/action-setup@v4
        with:
          version: 9

      # 3. Install Node.js (the JavaScript runtime)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      # 4. Install all project dependencies from package.json
      #    --no-frozen-lockfile: allows pnpm to fetch platform-specific native binaries
      #    (e.g. @tailwindcss/oxide for Linux) that may not be in the macOS-generated lockfile
      - run: pnpm install --no-frozen-lockfile

      # 5. Run the SvelteKit build — prerenders all pages to static HTML in build/
      - run: pnpm run build

      # 6. Configure the GitHub Pages environment for this repository
      - uses: actions/configure-pages@v3

      # 7. Package the build/ folder as a GitHub Pages artifact
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    needs: build-and-upload  # only runs after the build job succeeds
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 8. Publish the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
